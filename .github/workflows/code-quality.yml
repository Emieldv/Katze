name: Code Quality

on:
  pull_request:
    branches:
      - main

concurrency:
  group: code-quality-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: biomejs/setup-biome@v2

      - run: npm ci

      - name: Lint & format
        run: biome check .

      - name: Typecheck & build
        run: npm run build
