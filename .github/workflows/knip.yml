name: Knip

on:
  pull_request:
    branches:
      - main

concurrency:
  group: knip-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check for unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx knip
