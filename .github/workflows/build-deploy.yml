name: Build & Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      track:
        description: Play Store track
        required: true
        type: choice
        options:
          - internal
          - production

concurrency:
  group: build-deploy-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    # Skip internal build when Release Please creates the release commit
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    env:
      TRACK: ${{ github.event_name == 'release' && 'production' || inputs.track || 'internal' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
          working-directory: android

      - uses: biomejs/setup-biome@v2

      - run: npm ci

      - run: npm run build

      - run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build & upload to ${{ env.TRACK }} track
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy track:${{ env.TRACK }}
