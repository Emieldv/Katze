name: PR Title Check

on:
  pull_request:
    types: [ opened, edited, synchronize ]

concurrency:
  group: pr-title-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a subject after the type/scope"
